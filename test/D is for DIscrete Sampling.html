    <style>
#keyboard{

#keyboard button{
  margin:3px;
  padding:8px 10px;
  background:black;
  border:1px solid #00ff66;

  cursor:pointer;
}
#codeBox{
  display:flex;
  gap:10px;
  margin:20px 0;

.box{
  width:42px;

  border:1px solid #00ff66;

        body {
            background-color: #0e0e10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background: #16161a;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 850px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);

        }

        .formula-box {
            background: #000;

        .highlight { color: #ff3333; font-weight: bold; }

        .spec-box {
            position: relative;
            background: #050508;

        }

            display: block;
            background: #020204;
        }

        .control-panel {
            display: flex;
            align-items: center;

        }

            font-size: 0.95rem;
            color: #fff;
        }

        input[type="number"] {
            width: 120px;
            background: #000;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 8px;
            font-family: inherit;
            font-size: 1.1rem;

            border-radius: 4px;
            outline: none;
        }
        
        /* 移除数字输入框微调箭头，保持界面干净 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

</head>
<body data-index="3">

    <div class="container">
        <h1>D is for Discrete Sampling</h1>

        <div class="formula-box">
            <span class="info">当前分析信号：</span><br>
            x(t) = 4cos(4πt) + 8cos(8πt) + 12cos(12πt) + 16cos(16πt) + 12cos(18πt) + 10cos(20πt)<br>
            固定采样率 <span class="info">fs = 20 Hz</span>
        </div>

        <div class="spec-box">
            <canvas id="specCanvas" width="800" height="320"></canvas>
        </div>

        <div class="control-panel">
            <label>▶ 输入任意 DFT 计算点数 N (无卡死限制):</label>
            <input type="number" id="nInput" value="" placeholder="请输入N..." min="4" max="1024" oninput="processDFT()">
        </div>
    </div>

    <script {nonce}>
const rows = ["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];

const kb = document.getElementById("keyboard");

if(kb){
  rows.forEach(r=>{
    const div = document.createElement("div");
    r.split("").forEach(ch=>{
      const b = document.createElement("button");
      b.innerText = ch;
      b.onclick = ()=>pressKey(ch);
      div.appendChild(b);
    });
    kb.appendChild(div);
  });
}
        const canvas = document.getElementById('specCanvas');
        const ctx = canvas.getContext('2d');
        const PI = Math.PI;

        function processDFT() {
            let nInputValue = document.getElementById('nInput').value;
            
            // ✨ 保护逻辑：如果输入框为空，或者数字小于 4，直接清空画布并只画坐标轴，不计算谱线
            if (nInputValue === "" || isNaN(parseInt(nInputValue)) || parseInt(nInputValue) < 4) {
                drawScatterSpectrum([], 0); 
                return;
            }

            let N = parseInt(nInputValue);
            const fs = 20;

            // 1. 离散信号时域采样
            let x = new Array(N).fill(0);
            for (let n = 0; n < N; n++) {
                let t = n / fs;
                let val = 0;
                val += 4 * Math.cos(4 * PI * t);
                val += 8 * Math.cos(8 * PI * t);
                val += 12 * Math.cos(12 * PI * t);
                val += 16 * Math.cos(16 * PI * t);
                val += 12 * Math.cos(18 * PI * t);
                val += 10 * Math.cos(20 * PI * t);
                x[n] = val;
            }

            // 2. 经典高精准 DFT 计算
            let X_mag = new Array(N).fill(0);
            for (let k = 0; k < N; k++) {
                let real = 0;
                let imag = 0;
                for (let n = 0; n < N; n++) {
                    let angle = (2 * PI * k * n) / N;
                    real += x[n] * Math.cos(angle);
                    imag -= x[n] * Math.sin(angle);
                }
                X_mag[k] = Math.sqrt(real * real + imag * imag) / N;
            }

            drawScatterSpectrum(X_mag, N);
        }

        function drawScatterSpectrum(magArray, N) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const W = canvas.width;
            const H = canvas.height;
            const paddingBottom = 40;
            const paddingTop = 30;
            const graphHeight = H - paddingBottom - paddingTop;

            // A. 绘制底图参考虚线
            ctx.strokeStyle = '#1a1a24';
            ctx.lineWidth = 1;
            for(let i = 1; i < 10; i++) {
                let xLine = (W / 10) * i;
                ctx.beginPath(); ctx.moveTo(xLine, 0); ctx.lineTo(xLine, H - paddingBottom); ctx.stroke();
            }

            // B. 只有当 N > 0 时才绘制亮红点粒子
            if (N > 0 && magArray.length > 0) {
                for (let k = 0; k < N; k++) {
                    let xPos = (k / (N - 1)) * (W - 50) + 25; 
                    
                    let val = magArray[k];
                    let barHeight = (val / 10) * graphHeight;
                    if (barHeight < 0) barHeight = 0;
                    let yPos = H - paddingBottom - barHeight;

                    ctx.fillStyle = '#ff3333'; 
                    if (val > 0.05) {
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = '#ff3333';
                    } else {
                        ctx.shadowBlur = 0;
                    }

                    let radius = val > 0.05 ? 4.5 : 2;

                    ctx.beginPath();
                    ctx.arc(xPos, yPos, radius, 0, 2 * PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 当 N=20 满足整周期对齐时展示白色阶梯标签
                    if (N === 20 && [2, 4, 6, 8, 9, 10, 11, 12, 14, 16, 18].includes(k)) {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 10px Courier New';
                        ctx.textAlign = 'center';
                        ctx.fillText(`k:${k}`, xPos, yPos - 14);
                        ctx.fillText(`|X|:${(val).toFixed(1)}`, xPos, yPos - 4);
                    }
                }
            }

            // C. 频率底轴
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, H - paddingBottom);
            ctx.lineTo(W, H - paddingBottom);
            ctx.stroke();

            // D. 标定坐标轴文字
            ctx.fillStyle = '#888';
            ctx.font = '12px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText("k = 0 (0 Hz)", 10, H - 12);
            ctx.textAlign = 'center';
            ctx.fillText(N > 0 ? `k = N/2 = ${Math.floor(N/2)} (10 Hz 奈奎斯特)` : "k = N/2 (10 Hz 奈奎斯特)", W / 2, H - 12);
            ctx.textAlign = 'right';
            ctx.fillText(N > 0 ? `k = N-1` : "k = N-1", W - 10, H - 12);
        }

        // 默认初始化运行（由于输入为空，此时只会绘制空白底轴和网格线）
        processDFT();
    </script>
<script>
const pageList = [
  "A is for Amplitude Modulation.html",
  "B is for Binary.html",
  "C is for Convolution.html",
  "D is for DIscrete Sampling.html",
  "E is for Error Correcting.html",
  "F is for Fourier Transform.html"
];

const answer = ["M","A","T","A","N","E"];

// 当前页面编号（0~5）
const pageIndex = Number(document.body.dataset.index);

// 读取已存密码
let code = JSON.parse(localStorage.getItem("arg_code") || "[]");

// 初始化UI
function renderBoxes(){
  for(let i=0;i<6;i++){
    const el = document.getElementById("b"+i);
    if(el) el.innerText = code[i] || "";
  }
}

// 错误提示
function error(){
  alert("Error");
}

// 点击字母
function pressKey(letter){
  const expected = answer[pageIndex];

  if(letter !== expected){
    error();
    return;
  }

  code[pageIndex] = letter;
  localStorage.setItem("arg_code", JSON.stringify(code));
  renderBoxes();

  setTimeout(()=>{
    if(pageIndex < 5){
      window.location.href = pageList[pageIndex + 1];
    } else {
      window.location.href = "Appreciation.html";
    }
  }, 500);
}

window.onload = renderBoxes;
</script>
</body>
</html>
