<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C is for Convolution</title>
<div id="codeBox">
  <div class="box" id="b0"></div>
  <div class="box" id="b1"></div>
  <div class="box" id="b2"></div>
  <div class="box" id="b3"></div>
  <div class="box" id="b4"></div>
  <div class="box" id="b5"></div>
<div id="keyboard"></div>
</div>
    <style>
#codeBox{
  display:flex;
  gap:10px;
  margin:20px 0;
  justify-content:center;
}

.box{
  width:42px;
  height:42px;
  border:1px solid #00ff66;
  color:#00ff66;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
#keyboard{
  margin-top:20px;
  text-align:center;
}

#keyboard button{
  margin:3px;
  padding:8px 10px;
  background:black;
  border:1px solid #00ff66;
  color:#00ff66;
  cursor:pointer;
}
        body {
            background-color: #0e0e10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
            text-align: center;
        }

        .section-container {
            background: #16161a;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            padding: 25px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px dashed #00ff66;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #fff;
        }

        /* 字母映射表样式 */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 5px;
            margin: 15px 0;
            font-size: 0.8rem;
            text-align: center;
        }
        .map-item {
            border: 1px solid rgba(0, 255, 102, 0.2);
            padding: 4px 2px;
            background: rgba(0,0,0,0.2);
        }
        .map-char { font-weight: bold; color: #00ff66; }
        .map-num { color: #888; }

        .wave-box {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* 观测窗样式 */
        .window-container {
            border: 2px solid #00ff66;
            background: rgba(0, 255, 102, 0.03);
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }
        .window-title {
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .window-display {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 6px;
            white-space: nowrap;
        }
        .word-gap {
            margin-right: 25px; 
            display: inline-block;
        }

        /* 控制区域 */
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #aaa;
        }
        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 12px;
            font-family: inherit;
            font-size: 1.1rem;
            box-sizing: border-box;
            border-radius: 4px;
        }
        .status-bar {
            margin-top: 5px;
            font-size: 0.9rem;
            border-top: 1px dashed #333;
            padding-top: 15px;
            color: #666;
        }
    </style>
</head>
<body data-index="2">

    <h1>C is for Convolution</h1>

    <div class="section-container">
        <div class="section-title">Linear Convolution</div>
        <div style="font-size: 0.95rem; color: #ccc; line-height: 1.6;">
                    <div class="wave-box">
                <strong>h(n) = {L, I, N} * {C, I, R}</strong>
            </div>
        </div>

        <div class="map-grid" id="mapGrid"></div>
    </div>


    <div class="section-container">
        <div class="section-title">Circular Convolution (N=14)</div>
        
        <div class="window-container">
            <div class="window-title">14-Point Circular Observation Window</div>
            <div class="window-display" id="windowDisplay"></div>
        </div>

        <div class="input-group">
            <label>请输入得到的级联大数序列 h(n) （请用英文逗号分隔数字）：</label>
            <input type="text" id="hInput" value="1, 2, 3" oninput="calculate()">
        </div>
        
   
    </div>

   <script>
const rows = ["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];

const kb = document.getElementById("keyboard");

if(kb){
  rows.forEach(r=>{
    const div = document.createElement("div");
    r.split("").forEach(ch=>{
      const b = document.createElement("button");
      b.innerText = ch;
      b.onclick = ()=>pressKey(ch);
      div.appendChild(b);
    });
    kb.appendChild(div);
  });
}
    /* ================= 1. 自动生成标准 A-Z 映射表 ================= */
    const mapGrid = document.getElementById('mapGrid');
    let mapHtml = '';
    for(let i = 65; i <= 90; i++) {
        mapHtml += `
            <div class="map-item">
                <div class="map-char">${String.fromCharCode(i)}</div>
                <div class="map-num">${i - 64}</div>
            </div>
        `;
    }
    mapGrid.innerHTML = mapHtml;

    /* ================= 2. 循环卷积与双重白/黑名单联动内核 ================= */
    
    // 当且仅当后台运算中 h=[1] 时，完美直达 "THE PASSWORD IS T" 的 14 点固定整数基底响应矩阵
    const x_base = [19, 7, 4, 15, 0, 18, 18, 22, 14, 17, 3, 8, 18, 19];
    const N = 14;

    function calculate() {
        const inputVal = document.getElementById('hInput').value;
        const windowDisplay = document.getElementById('windowDisplay');        
        // 剔除所有空格，用于精准比对
        const cleanedInput = inputVal.replace(/\s+/g, '');

        let h = [];
        
        // 🎯 核心白名单与黑名单双重判定
        if (cleanedInput === "36,135,381,288,252") {
            // 路径 A：输入正确的大数级联答案 -> 触发真作弊，底层用 1 完美开锁
            h = [1];
        } else if (cleanedInput === "1") {
            // 路径 B：偷懒直接输入 1 -> 触发黑名单防御，强行放大为 413 产生干扰乱码
            h = [413];
        } else if (cleanedInput === "1,") {
            // 路径 B：偷懒直接输入 1 -> 触发黑名单防御，强行放大为 413 产生干扰乱码
            h = [413];

            }else if (cleanedInput === "1，") {
            // 路径 B：偷懒直接输入 1 -> 触发黑名单防御，强行放大为 413 产生干扰乱码
            h = [413];
        } else {
            // 路径 C：其他任意正常/错误输入 -> 按常规解析执行循环卷积
            h = inputVal.split(',')
                        .map(num => parseFloat(num.trim()))
                        .filter(num => !isNaN(num));
        }

        if (h.length === 0) {
            windowDisplay.innerHTML = `<span class="word-gap">AAA</span><span class="word-gap">AAAAAAAA</span><span class="word-gap">AA</span><span>A</span>`;
            return;
        }

        // 执行标准的 N=14 时域循环卷积
        let y = new Array(N).fill(0);
        for (let n = 0; n < N; n++) {
            let sum = 0;
            for (let m = 0; m < h.length; m++) {
                let index = ((n - m) % N + N) % N;
                sum += h[m] * x_base[index];
            }
            y[n] = Math.round(sum) % 26; 
        }

        // 英文字母动态映射显示
        let htmlHTML = "";
        for (let i = 0; i < N; i++) {
            let offset = (y[i] % 26 + 26) % 26; 
            let charStr = String.fromCharCode(65 + offset);
            
            // 进行视觉断句切分，符合 "THE PASSWORD IS T" 的排版
            if (i === 2 || i === 10 || i === 12) {
                htmlHTML += `<span class="word-gap">${charStr}</span>`;
            } else {
                htmlHTML += charStr;
            }
        }

        windowDisplay.innerHTML = htmlHTML;
    }

    // 初始化首次运行
    calculate();
</script><script>
const pageList = [
  "A is for Amplitude Modulation.html",
  "B is for Binary.html",
  "C is for Convolution.html",
  "D is for DIscrete Sampling.html",
  "E is for Error Correcting.html",
  "F is for Fourier Transform.html"
];

const answer = ["M","A","T","A","N","E"];

// 当前页面编号（0~5）
const pageIndex = Number(document.body.dataset.index);

// 读取已存密码
let code = JSON.parse(localStorage.getItem("arg_code") || "[]");

// 初始化UI
function renderBoxes(){
  for(let i=0;i<6;i++){
    const el = document.getElementById("b"+i);
    if(el) el.innerText = code[i] || "";
  }
}

// 错误提示
function error(){
  alert("Error");
}

// 点击字母
function pressKey(letter){
  const expected = answer[pageIndex];

  if(letter !== expected){
    error();
    return;
  }

  code[pageIndex] = letter;
  localStorage.setItem("arg_code", JSON.stringify(code));
  renderBoxes();

  setTimeout(()=>{
    if(pageIndex < 5){
      window.location.href = pageList[pageIndex + 1];
    } else {
      window.location.href = "Appreciation.html";
    }
  }, 500);
}

window.onload = renderBoxes;
</script>
</body>
</html>
